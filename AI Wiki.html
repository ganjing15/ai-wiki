<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Era — A Visual Index</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* warm paper palette */
    --paper:    #f4efe6;
    --paper-2:  #ede6d8;
    --paper-3:  #e3dac7;
    --ink:      #1a1814;
    --ink-2:    #3d362c;
    --ink-3:    #6a6356;
    --ink-4:    #948c7e;
    --rule:     #1a181420;
    --rule-2:   #1a18140d;

    /* a single warm accent + lab tints (muted, editorial) */
    --accent:   #c1442e;     /* vermillion */
    --accent-2: #2d5a3d;     /* forest */

    --c-openai:    #1a6b52;
    --c-anthropic: #b85a3a;
    --c-google:    #2c5aa0;
    --c-meta:      #1a3d8f;
    --c-deepseek:  #6b3d8f;
    --c-mistral:   #a86b1a;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* paper texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, #00000003 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, #00000004 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    pointer-events: none; z-index: 1;
  }

  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; }
  .mono  { font-family: 'JetBrains Mono', monospace; }

  /* NAV — minimal editorial header */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(244, 239, 230, 0.88);
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    border-bottom: 1px solid var(--rule);
    height: 56px;
    display: flex; align-items: center;
    padding: 0 56px;
  }
  .nav-mark {
    font-family: 'Instrument Serif', serif;
    font-size: 22px; font-style: italic;
    margin-right: auto;
    color: var(--ink);
  }
  .nav-mark::before {
    content: '※ ';
    font-style: normal; color: var(--accent);
  }
  nav .links { display: flex; gap: 28px; }
  nav a {
    color: var(--ink-3); text-decoration: none;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    position: relative;
    transition: color 0.2s;
  }
  nav a::after {
    content: ''; position: absolute; left: 0; bottom: -3px; height: 1px; width: 0;
    background: var(--ink); transition: width 0.25s ease;
  }
  nav a:hover { color: var(--ink); }
  nav a:hover::after { width: 100%; }

  .container { max-width: 1380px; margin: 0 auto; padding: 0 56px; position: relative; z-index: 2; }

  /* HERO */
  .hero {
    padding: 130px 0 100px;
    position: relative;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 80px;
    align-items: end;
  }
  .hero-eyebrow {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 32px;
    font-weight: 500;
  }
  .hero-eyebrow .vol {
    background: var(--ink); color: var(--paper);
    padding: 3px 8px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em; font-size: 10px;
  }
  .hero-eyebrow .rule { flex: 1; height: 1px; background: var(--ink); max-width: 60px; }

  .hero-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(64px, 9vw, 132px);
    line-height: 0.94;
    letter-spacing: -0.025em;
    color: var(--ink);
    font-weight: 400;
  }
  .hero-title em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-title .amp {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--ink-4);
    font-weight: 400;
    margin: 0 0.04em;
  }
  .hero-side {
    padding-bottom: 12px;
    border-left: 1px solid var(--ink);
    padding-left: 28px;
  }
  .hero-sub {
    font-family: 'Instrument Serif', serif;
    font-size: 21px;
    line-height: 1.4;
    color: var(--ink-2);
    text-wrap: pretty;
    margin-bottom: 24px;
  }
  .hero-sub em { font-style: italic; color: var(--accent); }
  .hero-meta {
    font-size: 12px; color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.7;
  }
  .hero-meta div span { color: var(--ink-2); }

  /* HERO STATS — editorial number row */
  .hero-stats {
    margin-top: 80px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
  }
  .hero-stat {
    padding: 24px 20px;
    border-right: 1px solid var(--rule);
    position: relative;
  }
  .hero-stat:last-child { border-right: none; }
  .hero-stat .num {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .hero-stat .num em { font-style: italic; color: var(--accent); }
  .hero-stat .lbl {
    font-size: 11px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .hero-stat .idx {
    position: absolute; top: 12px; right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-4);
  }

  /* SECTION */
  section {
    padding: 110px 0 30px;
    position: relative; z-index: 2;
  }
  .section-head {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 40px;
    margin-bottom: 64px;
    align-items: baseline;
    border-top: 1px solid var(--ink);
    padding-top: 32px;
  }
  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .section-num em { color: var(--accent); font-style: normal; }
  .section-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(36px, 5vw, 60px);
    line-height: 1.02;
    color: var(--ink);
    letter-spacing: -0.02em;
    font-weight: 400;
  }
  .section-title em { font-style: italic; color: var(--accent); }
  .section-sub {
    font-family: 'Instrument Serif', serif;
    font-size: 19px;
    color: var(--ink-2);
    margin-top: 16px;
    max-width: 620px;
    line-height: 1.45;
  }

  /* TIMELINE */
  .timeline-controls {
    display: flex; gap: 6px; margin-bottom: 48px; flex-wrap: wrap;
    align-items: center;
  }
  .ctrl-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-right: 8px;
  }
  .tl-btn {
    padding: 6px 12px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink); font-size: 12px; font-weight: 500;
    cursor: pointer;
    font-family: 'Instrument Sans', sans-serif;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    border-radius: 0;
  }
  .tl-btn:hover { background: var(--ink); color: var(--paper); }
  .tl-btn.active { background: var(--ink); color: var(--paper); }
  .tl-divider { width: 24px; }

  .timeline-track {
    position: relative;
  }
  .tl-year-group {
    display: grid;
    grid-template-columns: 80px 1fr;
    column-gap: 0;
    position: relative;
    margin-bottom: 8px;
  }
  .tl-year-marker {
    grid-column: 1 / 2;
    position: sticky; top: 76px;
    align-self: start;
    padding-top: 24px;
    height: fit-content;
  }
  .tl-year-num {
    font-family: 'Instrument Serif', serif;
    font-size: 84px;
    font-style: italic;
    line-height: 0.9;
    color: var(--accent);
    letter-spacing: -0.04em;
  }
  .tl-year-events {
    grid-column: 2 / 3;
    border-left: 1px solid var(--ink);
    padding: 24px 0 24px 0;
    margin-bottom: 16px;
  }
  .tl-row {
    display: grid;
    grid-template-columns: 96px 1fr auto;
    gap: 24px;
    padding: 16px 32px 18px 32px;
    align-items: start;
    position: relative;
    border-bottom: 1px solid var(--rule-2);
    transition: background 0.15s;
  }
  .tl-row:last-child { border-bottom: none; }
  .tl-row::before {
    content: '';
    position: absolute; left: -4px; top: 22px;
    width: 7px; height: 7px;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 50%;
    transition: all 0.15s;
  }
  .tl-row:hover { background: var(--paper-2); }
  .tl-row:hover::before { background: var(--accent); border-color: var(--accent); }
  .tl-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    padding-top: 4px;
  }
  .tl-event {
    font-size: 16px; color: var(--ink);
    font-weight: 400;
    line-height: 1.4;
  }
  .tl-impact {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 14.5px;
    color: var(--ink-3);
    line-height: 1.4;
    margin-top: 4px;
    max-width: 580px;
    text-wrap: pretty;
  }
  .tl-body { min-width: 0; }
  .tl-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    white-space: nowrap;
    padding-top: 4px;
  }
  .tl-tag::before {
    content: '— ';
  }

  /* LAB CARDS - editorial style */
  .lab-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--ink);
    border-left: 1px solid var(--ink);
  }
  .lab-card {
    border-right: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 36px 36px 36px 36px;
    background: var(--paper);
    position: relative;
    transition: background 0.2s;
    cursor: default;
  }
  .lab-card:hover { background: var(--paper-2); }
  .lab-card .lab-num {
    position: absolute; top: 24px; right: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-4);
    letter-spacing: 0.08em;
  }
  .lab-name {
    font-family: 'Instrument Serif', serif;
    font-size: 38px; font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .lab-name em { font-style: italic; }
  .lab-founded {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3);
    letter-spacing: 0.06em;
    margin-bottom: 28px;
  }
  .lab-flagship {
    font-family: 'Instrument Serif', serif;
    font-size: 18px; color: var(--ink);
    margin-bottom: 24px;
    line-height: 1.4;
  }
  .lab-flagship em { font-style: italic; color: var(--accent); }
  .lab-kv {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px 24px;
    border-top: 1px solid var(--rule);
    padding-top: 20px;
  }
  .lab-kv-cell .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .lab-kv-cell .v {
    font-size: 14px; color: var(--ink);
    line-height: 1.3;
  }

  /* MODEL CHART - more refined */
  .chart-wrap {
    border: 1px solid var(--ink);
    background: var(--paper);
    padding: 32px 36px 36px;
  }
  .chart-axis-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    margin-bottom: 16px;
  }
  .axis-labels {
    position: relative; height: 18px;
  }
  .axis-tick {
    position: absolute; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .model-chart {
    display: flex; flex-direction: column;
    gap: 0;
    position: relative;
  }
  .grid-bg {
    position: absolute; left: 134px; right: 0; top: 0; bottom: 0;
    pointer-events: none;
  }
  .grid-line {
    position: absolute; top: 0; bottom: 0;
    width: 1px;
    background: var(--rule);
  }
  .model-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--rule-2);
    position: relative;
  }
  .model-row:last-child { border-bottom: none; }
  .model-lab-label {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--ink);
    text-align: right;
    letter-spacing: -0.01em;
  }
  .model-track {
    position: relative; height: 44px;
  }
  .model-bar {
    position: absolute;
    height: 28px; top: 8px;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    display: flex; align-items: center;
    padding: 0 10px;
    font-size: 11px; font-weight: 500;
    white-space: nowrap;
    cursor: default;
    transition: transform 0.15s;
    overflow: hidden;
    letter-spacing: 0.01em;
  }
  .model-bar:hover { transform: translateY(-1px); z-index: 10; box-shadow: 2px 2px 0 var(--ink); }
  .model-bar.filled { color: var(--paper); }
  .model-bar.narrow {
    overflow: visible;
    padding: 0;
  }
  .model-bar-extlabel {
    position: absolute;
    left: 100%; top: 50%;
    transform: translateY(-50%);
    padding-left: 6px;
    white-space: nowrap;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    pointer-events: none;
  }

  /* DEEPSEEK MOMENT - large editorial pull-quote feel */
  .moment {
    margin: 0 0 64px;
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 56px;
    align-items: center;
    padding: 56px 0 40px;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    position: relative;
  }
  .moment::before {
    content: '"';
    position: absolute; left: -8px; top: -12px;
    font-family: 'Instrument Serif', serif;
    font-size: 180px;
    font-style: italic;
    color: var(--accent);
    line-height: 0.6;
    pointer-events: none;
    opacity: 0.18;
  }
  .moment-text h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 44px; font-weight: 400;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 18px;
    letter-spacing: -0.02em;
  }
  .moment-text h3 em { font-style: italic; color: var(--accent); }
  .moment-text p {
    font-family: 'Instrument Serif', serif;
    font-size: 17px; color: var(--ink-2);
    line-height: 1.5;
    max-width: 540px;
  }
  .moment-stats { display: flex; gap: 40px; }
  .moment-stat {
    text-align: left;
  }
  .moment-stat .big {
    font-family: 'Instrument Serif', serif;
    font-size: 88px;
    font-style: italic;
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 0.9;
  }
  .moment-stat .sm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-top: 12px;
    max-width: 130px;
    line-height: 1.5;
  }

  /* FUNDING BARS */
  .funding-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--ink);
    border-left: 1px solid var(--ink);
  }
  .funding-card {
    border-right: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 32px 36px;
  }
  .funding-card h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 28px;
    line-height: 1.1;
  }
  .funding-card h3 em { font-style: italic; color: var(--accent); }
  .funding-bar-group { margin-bottom: 18px; }
  .funding-bar-group:last-child { margin-bottom: 0; }
  .funding-bar-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
    gap: 12px;
  }
  .funding-bar-meta .label {
    font-size: 11px; color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .funding-bar-meta .value {
    font-family: 'Instrument Serif', serif;
    font-size: 22px; font-style: italic;
    color: var(--ink);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .funding-bar-track {
    height: 12px;
    background: var(--paper-3);
    border: 1px solid var(--ink);
    overflow: hidden;
    position: relative;
  }
  .funding-bar-fill {
    height: 100%;
    background: var(--ink);
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    background-image: repeating-linear-gradient(
      45deg,
      transparent, transparent 4px,
      rgba(255,255,255,0.08) 4px, rgba(255,255,255,0.08) 8px
    );
  }
  .funding-bar-fill.accent { background-color: var(--accent); }

  /* NVIDIA / INFRA */
  .infra-callout {
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 48px 0 40px;
    margin: 56px 0 48px;
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 56px;
    align-items: stretch;
  }
  .stargate-text h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 44px; font-weight: 400;
    line-height: 1.04;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    text-wrap: balance;
  }
  .stargate-text h3 em { font-style: italic; color: var(--accent); }
  .stargate-text p {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    color: var(--ink-2);
    line-height: 1.5;
    margin-bottom: 24px;
    max-width: 480px;
  }
  .stargate-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px;
    border-top: 1px solid var(--rule); padding-top: 18px;
  }
  .stargate-meta-cell .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .stargate-meta-cell .v {
    font-family: 'Instrument Serif', serif;
    font-size: 22px; color: var(--ink);
    font-style: italic;
  }

  /* Nvidia revenue / market-cap chart */
  .nvidia-chart {
    border: 1px solid var(--ink);
    padding: 30px 32px 24px;
    background: var(--paper);
  }
  .nvidia-chart-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 24px; gap: 16px;
  }
  .nvidia-chart-head h4 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px; font-weight: 400;
    line-height: 1.1;
  }
  .nvidia-chart-head h4 em { font-style: italic; color: var(--accent); }
  .nvidia-chart-head .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-4);
    letter-spacing: 0.06em;
  }
  .nvidia-bars {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    align-items: end;
    height: 220px;

function TimelineSection() {
  const [filter, setFilter] = useState("all");
  const [labFilter, setLabFilter] = useState("all");

  const filters = [
    { id: "all",      label: "All" },
    { id: "model",    label: "Models" },
    { id: "policy",   label: "Policy" },
    { id: "biz",      label: "Business" },
    { id: "incident", label: "Incidents" },
    { id: "award",    label: "Awards" },
    { id: "research", label: "Research" },
  ];
  const labFilters = [
    { id: "all",      label: "All" },
    { id: "openai",   label: "OpenAI" },
    { id: "anthropic",label: "Anthropic" },
    { id: "google",   label: "Google" },
    { id: "meta",     label: "Meta" },
    { id: "deepseek", label: "DeepSeek" },
    { id: "xai",      label: "xAI" },
  ];

  const filtered = TIMELINE_EVENTS.filter(e => {
    if (filter !== "all" && e.cat !== filter) return false;
    if (labFilter !== "all" && e.lab !== labFilter) return false;
    return true;
  });

  const groups = {};
  filtered.forEach(e => {
    const yr = e.date.slice(0, 4);
    if (!groups[yr]) groups[yr] = [];
    groups[yr].push(e);
  });

  return (
    <section id="timeline">
      <div className="container">
        <SectionHead
          num="01 / Chronology"
          title={<>A timeline, <em>annotated</em>.</>}
          sub="Ninety-plus events from the Transformer paper through the present, filterable by category and by lab."
        />
        <div className="timeline-controls">
          <span className="ctrl-label">Filter</span>
          {filters.map(f => (
            <button key={f.id}
              className={`tl-btn ${filter === f.id ? "active" : ""}`}
              onClick={() => setFilter(f.id)}>{f.label}</button>
          ))}
          <div className="tl-divider" />
          <span className="ctrl-label">Lab</span>
          {labFilters.map(f => (
            <button key={f.id}
              className={`tl-btn ${labFilter === f.id ? "active" : ""}`}
              onClick={() => setLabFilter(f.id)}>{f.label}</button>
          ))}
        </div>

        <div className="timeline-track">
          {Object.keys(groups).sort().map(yr => (
            <div key={yr} className="tl-year-group">
              <div className="tl-year-marker">
                <div className="tl-year-num">'{yr.slice(2)}</div>
              </div>
              <div className="tl-year-events">
                {groups[yr].map((e, i) => (
                  <div key={i} className="tl-row">
                    <div className="tl-date">{formatDate(e.date)}</div>
                    <div className="tl-body">
                      <div className="tl-event">{e.label}</div>
                      {e.impact && <div className="tl-impact">{e.impact}</div>}
                    </div>
                    <div className="tl-tag">{CAT_LABELS[e.cat]}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {filtered.length === 0 && (
            <div style={{gridColumn:"2/3", padding:"24px 32px", color:"var(--ink-3)", borderLeft:"1px solid var(--ink)"}}>
              No events match this filter.
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

function formatDate(s) {
  // 2024-05-13 -> May 13, 2025-08 -> Aug
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [y, m, d] = s.split("-").map(Number);
  if (!d) return months[m-1];
  return `${months[m-1]} ${d}`;
}

        />
        <div className="people-grid">
          {people.map(p => {
            const inner = (
              <>
                <div className="person-monogram">{p.mono}</div>
                <div className="person-name">{p.name}</div>
                <div className="person-role">{p.role}</div>
                <div className="person-note">{p.note}</div>
              </>
            );
            return p.href
              ? <a key={p.name} href={p.href} className="person-card card-link">{inner}</a>
              : <div key={p.name} className="person-card">{inner}</div>;
          })}
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="footer-inner">
        <div className="footer-mark">A visual index<br/>of the <em>AI era</em>.</div>
        <div className="footer-meta">
          <div>Edition 2026.05</div>
          <div>78 articles · 90+ events</div>
          <div>Sources: Wikipedia, claude.com, lab announcements</div>
          <div>※ end of volume one</div>
        </div>
      </div>
    </footer>
  );
}

function App() {
  return (
    <>
      <Hero />
      <TimelineSection />
      <LabsSection />
      <ModelsSection />
      <AgentsSection />
      <FundingSection />
      <MacroSection />
      <IncidentsSection />
      <PolicySection />
      <ConceptsSection />
      <PeopleSection />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
